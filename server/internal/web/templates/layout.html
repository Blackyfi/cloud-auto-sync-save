{{define "layout" -}}
<!doctype html>
<html lang="en" class="h-full">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{block "title" .}}cass{{end}}</title>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
</style>
</head>
<body class="h-full bg-slate-900 text-slate-100">
<div class="min-h-full">
{{- if .Username}}
  <nav class="bg-slate-800 border-b border-slate-700">
    <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-lg font-semibold tracking-tight">cass</span>
        <span class="text-xs px-2 py-0.5 rounded bg-amber-900/40 text-amber-300 border border-amber-800/40">v1 / phase 0</span>
      </div>
      <div class="flex items-center gap-4 text-sm">
        <span class="text-slate-400">{{.Username}}</span>
        <form method="post" action="/logout">
          <button class="text-slate-300 hover:text-white">Sign out</button>
        </form>
      </div>
    </div>
  </nav>
{{- end}}
  <main class="max-w-6xl mx-auto px-6 py-10">
    {{block "content" .}}{{end}}
  </main>
</div>
</body>
</html>
{{- end}}
