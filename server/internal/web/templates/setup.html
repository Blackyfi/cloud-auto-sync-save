{{define "title"}}First-run setup — cass{{end}}

{{define "content"}}
<div class="max-w-md mx-auto bg-slate-800 border border-slate-700 rounded-lg p-6 shadow">
  <h1 class="text-xl font-semibold mb-1">Welcome to cass</h1>
  <p class="text-sm text-slate-400 mb-5">
    Create the admin account to get started. This is a one-time setup.
  </p>
  {{if .Error}}
  <div class="mb-4 px-3 py-2 rounded bg-red-900/40 text-red-200 border border-red-800/40 text-sm">{{.Error}}</div>
  {{end}}
  <form method="post" action="/setup" class="space-y-4">
    <div>
      <label class="block text-sm text-slate-300 mb-1">Username</label>
      <input name="username" required
             class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-sky-500">
    </div>
    <div>
      <label class="block text-sm text-slate-300 mb-1">Password</label>
      <input type="password" name="password" required minlength="8"
             class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-sky-500">
    </div>
    <div>
      <label class="block text-sm text-slate-300 mb-1">Confirm password</label>
      <input type="password" name="confirm" required minlength="8"
             class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-sky-500">
    </div>
    <button class="w-full bg-sky-600 hover:bg-sky-500 text-white rounded px-3 py-2 text-sm font-medium">
      Create admin account
    </button>
  </form>
</div>
{{end}}
